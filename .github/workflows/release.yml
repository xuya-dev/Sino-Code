name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - frontier
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RELEASE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
  SINO_CODE_UPDATE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      existing_tag: ${{ steps.version.outputs.existing_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute release version
        id: version
        run: node ./scripts/compute-ci-release-version.cjs

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    env:
      SINO_CODE_APP_VERSION: ${{ needs.prepare.outputs.version }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      MAC_CODESIGN_P12_BASE64: ${{ secrets.MAC_CODESIGN_P12_BASE64 }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      CSC_FOR_PULL_REQUEST: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect Apple signing credentials
        id: apple-signing
        run: |
          set -euo pipefail

          missing=()
          for name in MAC_CODESIGN_P12_BASE64 CSC_KEY_PASSWORD APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Apple signing credentials are configured."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            printf 'Apple signing credentials are not fully configured; building unsigned macOS packages. Missing: %s\n' "${missing[*]}"
          fi

      - name: Decode Apple signing credentials
        if: steps.apple-signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          cert_path="${RUNNER_TEMP}/developer-id.p12"
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          export CERT_PATH="${cert_path}"
          export KEY_PATH="${key_path}"

          node <<'NODE'
          const fs = require('node:fs')
          fs.writeFileSync(process.env.CERT_PATH, Buffer.from(process.env.MAC_CODESIGN_P12_BASE64, 'base64'))
          fs.writeFileSync(process.env.KEY_PATH, Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))
          NODE

          {
            echo "CSC_LINK=${cert_path}"
            echo "APPLE_API_KEY=${key_path}"
            echo "MAC_SIGN=1"
          } >> "${GITHUB_ENV}"

      - name: Verify Apple signing credentials
        if: steps.apple-signing.outputs.enabled == 'true'
        run: >
          npm run verify:apple -- --p12 "${CSC_LINK}"
          --p12-password "${CSC_KEY_PASSWORD}"
          --p8 "${APPLE_API_KEY}"
          --key-id "${APPLE_API_KEY_ID}"
          --issuer "${APPLE_API_ISSUER}"
          --check-notary

      - name: Build signed macOS packages
        if: steps.apple-signing.outputs.enabled == 'true'
        run: npm run dist:mac:signed

      - name: Build unsigned macOS packages
        if: steps.apple-signing.outputs.enabled != 'true'
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Sino-Code-*-mac-*.dmg
            dist/Sino-Code-*-mac-*.zip
            dist/Sino-Code-*-mac-*.blockmap
            dist/latest-mac.yml

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare
    env:
      SINO_CODE_APP_VERSION: ${{ needs.prepare.outputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Sino-Code-*-win-x64.exe
            dist/Sino-Code-*-win-x64.exe.blockmap
            dist/latest.yml

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SINO_CODE_APP_VERSION: ${{ needs.prepare.outputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Sino-Code-*-linux-x86_64.AppImage
            dist/Sino-Code-*-linux-x86_64.AppImage.blockmap
            dist/latest-linux.yml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          required=(
            "Sino-Code-*-mac-arm64.dmg"
            "Sino-Code-*-mac-x64.dmg"
            "Sino-Code-*-mac-arm64.zip"
            "Sino-Code-*-mac-x64.zip"
            "Sino-Code-*-win-x64.exe"
            "Sino-Code-*-linux-x86_64.AppImage"
            "latest-mac.yml"
            "latest.yml"
            "latest-linux.yml"
          )

          for pattern in "${required[@]}"; do
            if ! compgen -G "release-artifacts/${pattern}" > /dev/null; then
              echo "::error::Missing release artifact matching ${pattern}"
              find release-artifacts -maxdepth 2 -type f -print | sort
              exit 1
            fi
          done

          find release-artifacts -maxdepth 2 -type f -print | sort

      - name: Generate release notes
        run: |
          set -euo pipefail
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            node ./scripts/generate-release-notes.cjs "${PREVIOUS_TAG}" > release-notes.md
          else
            node ./scripts/generate-release-notes.cjs > release-notes.md
          fi

          {
            echo
            echo "---"
            echo
            echo "### 构建信息"
            echo
            echo "- Release version: \`${RELEASE_VERSION}\`"
            echo "- Release channel: \`${RELEASE_CHANNEL}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- macOS: built unsigned when Apple signing secrets are absent"
            echo "- Platforms: macOS arm64/x64, Windows x64, Linux x64"
          } >> release-notes.md

      - name: Ensure release tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          head_sha="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" > /dev/null; then
            tag_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            if [[ "${tag_sha}" != "${head_sha}" ]]; then
              echo "::error::Tag ${TAG_NAME} points at ${tag_sha}, expected ${head_sha}"
              exit 1
            fi
            echo "Reusing existing tag ${TAG_NAME}"
          else
            git tag -a "${TAG_NAME}" -m "${RELEASE_NAME}" "${head_sha}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Create or update draft GitHub Release
        run: |
          set -euo pipefail
          release_flags=(--draft)
          if [[ "${RELEASE_CHANNEL}" == "frontier" ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              "${release_flags[@]}"
          else
            gh release create "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --verify-tag \
              "${release_flags[@]}"
          fi

      - name: Upload GitHub Release assets
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(
            find release-artifacts -type f \
              \( -name 'Sino-Code-*' -o -name 'latest*.yml' \) \
              -print0
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber

      - name: Publish GitHub Release
        run: |
          set -euo pipefail

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq .id)"
          if [[ "${RELEASE_CHANNEL}" == "frontier" ]]; then
            jq -n '{ draft: false, prerelease: true }' > release-state.json
          else
            jq -n '{ draft: false, prerelease: false, make_latest: "true" }' > release-state.json
          fi

          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            --input release-state.json
